name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ACCURACY_THRESHOLD: "0.70"
  VM_IP: "20.41.123.141"
  VM_USER: "azureuser"
  APP_DIR: "/home/azureuser/mlops_project"

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --exclude=venv,__pycache__,.git \
            --max-line-length=120 \
            --ignore=E501,W503,E226

  # ── Job 2: Unit Tests ──────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Train & Evaluate ────────────────────────────────────────────────
  train:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest
    needs: test
    # Only train on push to main, not on PRs
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt dvc

      - name: Configure DVC remote & pull data
        run: |
          dvc remote modify localremote url ${{ secrets.DVC_REMOTE_URL }}
          dvc pull twcs.csv.dvc

      - name: Train model
        run: python train_pipeline.py twcs.csv

      - name: Check accuracy threshold
        run: |
          python - <<'EOF'
          import json, sys
          with open("artifacts/metrics.json") as f:
              m = json.load(f)
          print(f"Accuracy: {m['accuracy']:.4f} | F1: {m['f1']:.4f}")
          if m['accuracy'] < float("${{ env.ACCURACY_THRESHOLD }}"):
              print("FAILED: accuracy below threshold — aborting deploy")
              sys.exit(1)
          print("PASSED: deploying")
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            artifacts/model.joblib
            artifacts/vectorizer.joblib
            artifacts/metrics.json
          retention-days: 7

  # ── Job 4: Deploy to Azure VM via SSH ─────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: train
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/vm_key.pem
          chmod 600 ~/.ssh/vm_key.pem
          ssh-keyscan -H ${{ env.VM_IP }} >> ~/.ssh/known_hosts

      - name: Copy code to VM
        run: |
          rsync -avz --exclude=venv --exclude=__pycache__ \
            --exclude=.git --exclude=twcs.csv --exclude=mlruns \
            -e "ssh -i ~/.ssh/vm_key.pem" \
            ./ ${{ env.VM_USER }}@${{ env.VM_IP }}:${{ env.APP_DIR }}/

      - name: Deploy & restart services on VM
        run: |
          ssh -i ~/.ssh/vm_key.pem ${{ env.VM_USER }}@${{ env.VM_IP }} << 'ENDSSH'
            set -e
            cd ~/mlops_project

            # Create venv if not exists (Ubuntu 24.04 blocks system pip)
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # Install/update dependencies inside venv
            venv/bin/pip install -r requirements.txt --quiet

            mkdir -p logs

            # Restart FastAPI
            pkill -f "uvicorn api.main:app" || true
            nohup venv/bin/uvicorn api.main:app --host 0.0.0.0 --port 8000 \
              > logs/api.log 2>&1 &
            echo "FastAPI restarted"

            # Restart Streamlit
            pkill -f "streamlit run app.py" || true
            nohup venv/bin/streamlit run app.py \
              --server.port 80 \
              --server.address 0.0.0.0 \
              --server.headless true \
              > logs/streamlit.log 2>&1 &
            echo "Streamlit restarted"
          ENDSSH

      - name: Smoke test — Streamlit UI
        run: |
          sleep 15
          curl --fail http://${{ env.VM_IP }}/ \
            || (echo "Streamlit smoke test failed" && exit 1)
          echo "Streamlit OK"

      - name: Smoke test — FastAPI
        run: |
          curl --fail http://${{ env.VM_IP }}:8000/health \
            || (echo "FastAPI smoke test failed" && exit 1)
          echo "FastAPI OK"

      - name: Post deploy summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Streamlit UI | http://${{ env.VM_IP }}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| FastAPI | http://${{ env.VM_IP }}:8000 |" >> $GITHUB_STEP_SUMMARY
          echo "| API Docs | http://${{ env.VM_IP }}:8000/docs |" >> $GITHUB_STEP_SUMMARY
