name: Auto Retrain on New Data

on:
  push:
    branches: [main]
    paths:
      - "twcs.csv.dvc"   # triggers when new data version is pushed
      - "config.py"      # triggers when hyperparameters change

env:
  PYTHON_VERSION: "3.11"
  ACCURACY_THRESHOLD: "0.70"
  VM_IP: "20.41.123.141"

jobs:
  retrain-and-deploy:
    name: Retrain & Redeploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt dvc

      - name: Pull new data from DVC remote
        run: |
          dvc remote modify localremote url ${{ secrets.DVC_REMOTE_URL }}
          dvc pull twcs.csv.dvc

      - name: Retrain model
        run: python train_pipeline.py twcs.csv

      - name: Check accuracy threshold
        run: |
          python - <<'EOF'
          import json, sys
          with open("artifacts/metrics.json") as f:
              m = json.load(f)
          print(f"New accuracy: {m['accuracy']:.4f} | F1: {m['f1']:.4f}")
          if m['accuracy'] < float("${{ env.ACCURACY_THRESHOLD }}"):
              print("FAILED: new model below threshold — keeping old model")
              sys.exit(1)
          print("PASSED: new model is better, deploying")
          EOF

      - name: Setup SSH & deploy new model to VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/vm_key.pem
          chmod 600 ~/.ssh/vm_key.pem
          ssh-keyscan -H ${{ env.VM_IP }} >> ~/.ssh/known_hosts

          # Copy new model artifacts only
          rsync -avz -e "ssh -i ~/.ssh/vm_key.pem" \
            artifacts/model.joblib artifacts/vectorizer.joblib artifacts/metrics.json \
            azureuser@${{ env.VM_IP }}:~/mlops_project/artifacts/

          # Restart API with new model
          ssh -i ~/.ssh/vm_key.pem azureuser@${{ env.VM_IP }} << 'ENDSSH'
            pkill -f "uvicorn api.main:app" || true
            cd ~/mlops_project
            nohup uvicorn api.main:app --host 0.0.0.0 --port 8000 \
              > logs/api.log 2>&1 &
            echo "API restarted with new model"
          ENDSSH

      - name: Smoke test
        run: |
          sleep 15
          curl --fail http://${{ env.VM_IP }}:8000/health
          echo "New model deployed and healthy"
